# Bookmark Income Engine — Configuration
#
# IMPORTANT: Copy this file to a config.yaml that lives OUTSIDE the plugin
# install directory. The plugin bundle is often mounted read-only (Cowork /
# plugin-mount contexts), so a config.yaml saved inside it will NOT persist
# between sessions — every fresh session would find nothing.
#
# Recommended stable location (created automatically if missing):
#   ~/Documents/Claude/Projects/AI Projects/bookmark-income-engine/config.yaml
#
# The process-bookmarks skill resolves the config in this priority order:
#   1. $BOOKMARK_ENGINE_CONFIG        (env var override — always wins)
#   2. ~/Documents/Claude/Projects/AI Projects/bookmark-income-engine/config.yaml
#   3. <plugin-root>/config.yaml      (last-resort fallback; will NOT persist)
#
# So either copy this file to path #2, or set $BOOKMARK_ENGINE_CONFIG to point
# wherever you keep it. Then customize the fields below for your setup.

# Your personal mission statement — bookmarks are scored against this lens.
# Be specific about what "high value" means to YOU.
mission: >
  Financial freedom through AI automation, passive income systems,
  and building products that run without me.

# High-scoring bookmark categories (opportunity axis)
priorities:
  high:  # score 7-10
    - AI automation tools and workflows
    - Passive income / automated trading systems
    - No-code / low-code business tools
    - Side project monetization
    - Developer tools that save significant time
  medium:  # score 5-6
    - General programming tips (if directly applicable)
    - Industry news about AI companies or tools
    - Networking / audience building strategies
  low:  # score 1-4 — these get basic treatment only
    - Pure entertainment / memes
    - Political commentary
    - General life advice unrelated to mission

# Your project portfolio — skills and opportunities are mapped to these.
# Remove the examples and add your own projects.
projects:
  - name: my-saas-app
    path: ~/projects/my-saas-app
    description: React/Node SaaS application for widget management
    tech: [typescript, react, node, postgres]
    revenue_status: active  # active | pre-revenue | side-project
    improvement_vectors:
      - Better onboarding flow
      - API integrations
      - Pricing optimization

  - name: my-automation-bot
    path: ~/projects/my-bot
    description: Python automation bot running on VPS
    tech: [python, automation]
    revenue_status: active
    improvement_vectors:
      - Better prediction models
      - Faster execution
      - New market coverage

# Your technical profile — used by opportunity-analyst for fit scoring.
skills:
  languages: [python, typescript, react]
  platforms: [vercel, vps, chrome-extensions]
  strengths: [automation, AI/ML, web development]

# Output directory for markdown run archives and dedup tracker.
# Relative to the plugin install location, or use an absolute path.
output_dir: ./output

# Default number of bookmarks to capture per run.
default_count: 30
